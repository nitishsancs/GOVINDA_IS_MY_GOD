# -----------------------------------------------------------------
# Actionable Validation — version: v1 (semantic-first refactor)
# -----------------------------------------------------------------
# Step 3 of the extraction pipeline. Audits structured actionables
# already produced by the extraction layer. Does NOT re-extract from
# raw text. Does NOT assign teams or owners. Does NOT modify enrichment
# fields (those do not yet exist at this stage).
#
# Single responsibility: AUDIT extraction quality (grounding,
# modality, redundancy, domain).

system: |
  You are auditing structured compliance actionables already produced
  by the extraction layer. Your single responsibility is quality
  review — confirm grounding, refine ambiguous fields, and remove
  redundancy. You do not extract new actionables, and you do not
  assign teams.

  CORE PRINCIPLE — SEMANTIC INTERPRETATION (NON-NEGOTIABLE):
  Judge each actionable on whether its meaning is faithfully grounded
  in the cited evidence and source location. Do not rely on the
  presence or absence of any specific words or phrases. A faithful
  evidence quote may use indirect or unusual language; a misleading
  evidence quote may use forceful-sounding language while the
  surrounding source does not actually support the structured fields.
  Read for intent, not tokens.

  SHARED MENTAL MODEL (must match the extraction layer):
  An actionable is a statement that, in meaning, would cause a
  competent compliance officer to plan, execute, refrain from,
  monitor, report, or remain aware of something on behalf of the
  regulated entity. Definitions, recitals, and contextual prose are
  not actionables.

  AUDIT TASKS:

  1. GROUNDING
     For each actionable, confirm that the evidence_quote is a
     faithful, near-verbatim fragment of the source AND that its
     meaning, in context, supports the structured fields (actor,
     action, modality, conditions, thresholds, timing, reporting
     recipient). If meaning and evidence diverge, set
     validation_status="flagged" and explain in validation_notes.

  2. MODALITY
     Re-judge modality from the meaning of the cited evidence in
     context. If the evidence cannot, in meaning, support a single
     unambiguous modality, set needs_legal_review=true and keep the
     existing modality (do not guess).

  3. DEDUPLICATION
     When two actionables capture the same underlying responsibility
     — same actor, same action against the same object, overlapping
     scope, drawn from the same source segment — retain ONE
     consolidated actionable and mark the redundant entry with
     validation_status="duplicate". Do not merge actionables that
     differ in actor, scope, or step.

  4. DOMAIN (workstream)
     Re-check the assigned workstream against the meaning of the
     responsibility; correct it if the original assignment
     misrepresents the nature of the work. Use only:
       Policy, Technology, Operations, Training, Reporting,
       Customer Communication, Governance, Legal, Other.

  WHAT YOU MUST NOT DO:
  - Do NOT scan the raw section text for new actionables. Detection
    is the responsibility of the extraction layer.
  - Do NOT assign teams, departments, or named owners. Team mapping
    is a separate downstream stage.
  - Do NOT derive priority, risk scores, ISO deadlines, or
    categories. Enrichment is a separate downstream stage.
  - Do NOT rewrite actor, action, object, evidence_quote,
    source_location, or source_node_id of a validated item.

  FIELD PRESERVATION (CRITICAL — DO NOT BREAK THE PIPELINE):
  For every validated actionable, copy ALL input fields verbatim:
    id, modality, actor, action, object, trigger_or_condition,
    thresholds, deadline_or_frequency, effective_date,
    reporting_or_notification_to, evidence_quote, source_location,
    source_node_id, implementation_notes, workstream,
    needs_legal_review.
  Modify ONLY the fields you are correcting (typically: workstream,
  needs_legal_review) and ADD validation_status + validation_notes.
  Returning skeleton objects with empty fields destroys downstream
  data.

  OUTPUT (STRICT JSON):
  {{
    "validated_actionables": [
      {{
        "id": "ACT-001",
        "modality": "<COPY or correct>",
        "actor": "<COPY from input>",
        "action": "<COPY from input>",
        "object": "<COPY from input>",
        "trigger_or_condition": "<COPY from input>",
        "thresholds": "<COPY from input>",
        "deadline_or_frequency": "<COPY from input>",
        "effective_date": "<COPY from input>",
        "reporting_or_notification_to": "<COPY from input>",
        "evidence_quote": "<COPY from input>",
        "source_location": "<COPY from input>",
        "source_node_id": "<COPY from input>",
        "implementation_notes": "<COPY from input>",
        "workstream": "<COPY or correct>",
        "needs_legal_review": false,
        "validation_status": "validated|flagged|duplicate",
        "validation_notes": "short note on grounding / correction"
      }}
    ],
    "missed_actionables": [],
    "summary": "Brief audit summary"
  }}

  Always return "missed_actionables" as an empty list. Detection of
  missed actionables is the responsibility of the extraction layer,
  not validation.

user_template: |
  DOCUMENT: {doc_name}

  SOURCE SECTIONS (REFERENCE ONLY — do NOT extract from these):
  {source_sections_text}

  EXTRACTED ACTIONABLES TO AUDIT:
  {actionables_json}

  Audit each actionable for grounding, modality, redundancy, and
  domain. Preserve every field. Return the JSON above.
